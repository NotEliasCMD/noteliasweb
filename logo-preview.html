<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>elias logo — candidates preview</title>
  <!--
    Standalone review page for the new "elias" data-science logo.
    NOT linked from the site. Loads the real styles.css so every candidate
    inherits the site tokens (--peach, --ink, fonts) and recolors in the dark
    panels for free. Pick a winner, then wire it into index.html nav (:36-39)
    + footer (:560-563) per the plan.
        python3 -m http.server 8099  →  http://localhost:8099/logo-preview.html

    Each candidate renders in a LIGHT panel and a DARK panel, side by side,
    shown both at nav scale (in a mock nav bar) and enlarged. Wordmark
    candidates demo the elias⇄saile mirror on hover.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍑</text></svg>" />
  <style>
    body { font-family: var(--font-sans); color: var(--ink); background: var(--cream); margin: 0; }
    .wrap { max-width: 1180px; margin: 0 auto; padding: clamp(1.5rem, 4vw, 3rem); }
    header.page { margin-bottom: 2.5rem; }
    header.page h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); margin: 0 0 .5rem; letter-spacing: -0.02em; }
    header.page p { color: var(--ink-soft); font-family: var(--font-mono); font-size: .85rem; max-width: 60ch; line-height: 1.6; }
    .legend { font-family: var(--font-mono); font-size: .75rem; color: var(--muted); margin-top: 1rem; }

    .group__title { font-family: var(--font-mono); font-size: .8rem; text-transform: uppercase; letter-spacing: .1em;
      color: var(--peach-deep); border-bottom: 1px solid var(--line); padding-bottom: .5rem; margin: 2.5rem 0 1.25rem; }

    .cand { border: 1px solid var(--line); border-radius: var(--radius, 14px); margin-bottom: 1.5rem; overflow: hidden; }
    .cand__head { padding: .9rem 1.1rem; border-bottom: 1px solid var(--line); }
    .cand__name { font-family: var(--font-mono); font-size: .9rem; font-weight: 600; }
    .cand__name b { color: var(--peach-deep); }
    .cand__desc { font-size: .82rem; color: var(--ink-soft); margin-top: .25rem; line-height: 1.5; }
    .cand__panels { display: grid; grid-template-columns: 1fr 1fr; }
    @media (max-width: 720px) { .cand__panels { grid-template-columns: 1fr; } }

    .panel { padding: 1.25rem; background: var(--cream); }
    .panel + .panel { border-left: 1px solid var(--line); }
    @media (max-width: 720px) { .panel + .panel { border-left: none; border-top: 1px solid var(--line); } }
    .panel__tag { font-family: var(--font-mono); font-size: .68rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: .9rem; }

    /* mock nav bar to preview real placement */
    .navbar { display: flex; align-items: center; height: 68px; padding: 0 1rem; border: 1px solid var(--line);
      border-radius: 10px; background: color-mix(in srgb, var(--cream) 82%, transparent); }
    .brand { display: flex; align-items: center; gap: .5rem; font-weight: 600; color: var(--ink); text-decoration: none; }
    .brand .logo { display: flex; align-items: center; }
    .brand .logo svg { width: 22px; height: 22px; display: block; color: var(--ink); }
    .brand .name { font-family: var(--font-mono); font-size: 1.05rem; letter-spacing: -0.02em; }
    .brand .dot { color: var(--peach-deep); }

    .big { margin-top: 1.1rem; display: flex; align-items: center; gap: 1.5rem; }
    .big .logo svg { width: 64px; height: 64px; display: block; color: var(--ink); }
    .big .name { font-family: var(--font-mono); font-size: 2rem; letter-spacing: -0.02em; color: var(--ink); }
    .big .dot { color: var(--peach-deep); }

    /* --- #6 i-as-datapoint --- */
    .idot { position: relative; display: inline-block; }
    .idot .stem { position: relative; }
    .idot .node { position: absolute; left: 50%; transform: translateX(-50%); width: .34em; height: .34em; border-radius: 50%;
      background: var(--peach); box-shadow: 0 0 0 .12em color-mix(in srgb, var(--peach) 35%, transparent); }

    /* --- #7 elias<->saile mirror --- */
    .mirror { position: relative; display: inline-block; }
    .mirror .axis { position: absolute; left: 50%; top: -3px; bottom: -3px; width: 1px; background: var(--peach); opacity: .45; }
    .mirror .w { transition: opacity .45s var(--ease, ease), transform .45s var(--ease, ease); display: inline-block; }
    .mirror .w--saile { position: absolute; left: 0; top: 0; opacity: 0; transform: translateX(8px); color: var(--peach-deep); }
    .mirror:hover .w--elias { opacity: 0; transform: translateX(-8px); }
    .mirror:hover .w--saile { opacity: 1; transform: translateX(0); }
    @media (prefers-reduced-motion: reduce) {
      .mirror .w { transition: none; }
      .mirror:hover .w--elias { opacity: 1; transform: none; }
      .mirror:hover .w--saile { opacity: 0; }
    }

    /* --- #5 sparkline baseline --- */
    .spark { position: relative; display: inline-block; padding-bottom: 8px; }
    .spark svg { position: absolute; left: 0; right: 0; bottom: 0; width: 100%; height: 8px; overflow: visible; color: var(--ink); }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="page">
      <h1>elias — logo candidates</h1>
      <p>Data-science marks for the name <b>elias</b> (reverses to <b>saile</b>).
         All use the site tokens, so the dark panel is the true dark-mode render.
         Hover the wordmark candidates to see the saile easter egg.</p>
      <p class="legend">left = light · right = dark · each shown at nav scale (68px bar) then enlarged</p>
    </header>

    <div id="root"></div>
  </div>

  <script>
    /* ---------- candidate markup ---------- */
    // Icon glyphs: 24x24 viewBox, currentColor = ink, var(--peach)/(--peach-deep) accents.
    const ICONS = {
      scatter: `<svg viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
        <line x1="3" y1="19.5" x2="21" y2="4.5" stroke="var(--peach)" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="4"  cy="18" r="1.3" fill="currentColor"/>
        <circle cx="9"  cy="15" r="1.3" fill="currentColor"/>
        <circle cx="12" cy="16" r="1.3" fill="currentColor"/>
        <circle cx="16" cy="10" r="1.3" fill="currentColor"/>
        <circle cx="20" cy="6"  r="1.9" fill="var(--peach-deep)"/>
      </svg>`,
      sparkline: `<svg viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
        <polyline points="3,16 7,13 10,15 14,9 17,11 21,5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="21" cy="5" r="2.1" fill="var(--peach)"/>
      </svg>`,
      bell: `<svg viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
        <path d="M2 19 C 7.5 19, 8 6, 12 6 C 16 6, 16.5 19, 22 19 Z" fill="var(--peach)" opacity="0.20"/>
        <path d="M2 19 C 7.5 19, 8 6, 12 6 C 16 6, 16.5 19, 22 19" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="2" y1="19" x2="22" y2="19" stroke="currentColor" stroke-width="1" opacity="0.35"/>
        <circle cx="12" cy="6" r="1.8" fill="var(--peach-deep)"/>
      </svg>`,
      node: `<svg viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
        <g stroke="var(--peach)" stroke-width="1.3" opacity="0.85">
          <line x1="6" y1="7" x2="17" y2="6"/>
          <line x1="6" y1="7" x2="12" y2="13"/>
          <line x1="17" y1="6" x2="12" y2="13"/>
          <line x1="12" y1="13" x2="7" y2="18"/>
          <line x1="12" y1="13" x2="18" y2="17"/>
        </g>
        <g fill="currentColor">
          <circle cx="6" cy="7" r="1.7"/>
          <circle cx="7" cy="18" r="1.7"/>
          <circle cx="18" cy="17" r="1.7"/>
        </g>
        <circle cx="17" cy="6" r="1.9" fill="var(--peach-deep)"/>
        <circle cx="12" cy="13" r="1.9" fill="var(--peach-deep)"/>
      </svg>`,
    };

    // Monograms: 32x32 badge.
    const MONOS = {
      eframe: `<svg viewBox="0 0 32 32" fill="none" aria-hidden="true" focusable="false">
        <rect x="3.5" y="3.5" width="25" height="25" rx="5" stroke="var(--line)" stroke-width="1.4"/>
        <line x1="8" y1="24" x2="24" y2="24" stroke="currentColor" stroke-width="1" opacity="0.35"/>
        <line x1="8" y1="24" x2="8" y2="8" stroke="currentColor" stroke-width="1" opacity="0.35"/>
        <text x="16.5" y="23" text-anchor="middle" font-family="var(--font-mono)" font-size="19" font-weight="600" fill="currentColor">e</text>
        <circle cx="23" cy="10" r="2" fill="var(--peach-deep)"/>
      </svg>`,
      bars: `<svg viewBox="0 0 32 32" fill="none" aria-hidden="true" focusable="false">
        <rect x="7" y="7" width="3.2" height="18" rx="1" fill="var(--peach-deep)"/>
        <rect x="10.2" y="7"    width="15" height="3.2" rx="1" fill="var(--peach)"/>
        <rect x="10.2" y="14.4" width="10.5" height="3.2" rx="1" fill="var(--peach)" opacity="0.7"/>
        <rect x="10.2" y="21.8" width="15" height="3.2" rx="1" fill="var(--peach)" opacity="0.5"/>
      </svg>`,
      nodeE: `<svg viewBox="0 0 32 32" fill="none" aria-hidden="true" focusable="false">
        <g stroke="var(--peach)" stroke-width="1.4" opacity="0.8">
          <line x1="9" y1="8" x2="9" y2="24"/>
          <line x1="9" y1="8" x2="22" y2="8"/>
          <line x1="9" y1="16" x2="19" y2="16"/>
          <line x1="9" y1="24" x2="22" y2="24"/>
        </g>
        <g fill="currentColor">
          <circle cx="9" cy="16" r="2"/>
          <circle cx="19" cy="16" r="2"/>
          <circle cx="22" cy="8" r="2"/>
          <circle cx="22" cy="24" r="2"/>
        </g>
        <circle cx="9" cy="8" r="2.2" fill="var(--peach-deep)"/>
        <circle cx="9" cy="24" r="2.2" fill="var(--peach-deep)"/>
      </svg>`,
    };

    // Wordmark treatments: return {navHTML, bigHTML} given a scale context.
    const wordmark = {
      plain: () => `<span class="name">elias<span class="dot">.</span></span>`,
      spark: () => `<span class="spark"><span class="name">elias<span class="dot">.</span></span>
        <svg viewBox="0 0 100 8" preserveAspectRatio="none" fill="none" aria-hidden="true">
          <polyline points="2,6 22,3 40,5 60,2 80,4 98,1" stroke="var(--peach)" stroke-width="1.4" vector-effect="non-scaling-stroke" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="98" cy="1" r="2.4" fill="var(--peach-deep)"/>
        </svg></span>`,
      idot: () => `<span class="name idot">el<span class="stem">&#305;<span class="node"></span></span>as<span class="dot">.</span></span>`,
      mirror: () => `<span class="name mirror"><span class="axis"></span><span class="w w--elias">elias<span class="dot">.</span></span><span class="w w--saile">saile<span class="dot">.</span></span></span>`,
    };

    /* ---------- candidate list ---------- */
    const CANDS = [
      { group: 'A · Icon glyph + elias wordmark', items: [
        { name: '1 · Scatter + regression', desc: 'Ascending regression line through scatter points; top point in deep peach. The clearest data-science read.', icon: ICONS.scatter },
        { name: '2 · Sparkline', desc: 'Mini line chart rising into a peach terminal dot. Also works as the i-tittle (see #6).', icon: ICONS.sparkline },
        { name: '3 · Gaussian bell curve', desc: 'Normal distribution with soft peach fill and a peak marker. Very clean at tiny sizes.', icon: ICONS.bell },
        { name: '4 · Node graph', desc: 'Nodes + edges — a small network / neural motif. Deep-peach hub nodes.', icon: ICONS.node },
      ]},
      { group: 'B · Wordmark treatment (no separate icon)', items: [
        { name: '5 · elias + sparkline baseline', desc: 'The wordmark with a peach sparkline underline ending in a data point.', word: 'spark' },
        { name: '6 · i-as-datapoint', desc: 'Minimal — the tittle of the i becomes a glowing peach data node (reuses the eyebrow-tick glow).', word: 'idot' },
        { name: '7 · elias ⇄ saile mirror  (easter egg)', desc: 'Hover to reflect the wordmark across a peach axis, revealing saile. Static under reduced motion.', word: 'mirror' },
      ]},
      { group: 'C · Icon-only monogram (compact badge)', items: [
        { name: '8 · e in a plot frame', desc: 'Lowercase e inside an x/y-axed square with a data point.', mono: MONOS.eframe },
        { name: '9 · Bars “E”', desc: 'Capital E as a bar chart — spine + three graded peach bars.', mono: MONOS.bars },
        { name: '10 · Node “E / S” badge', desc: 'E drawn as a node-link graph; nods to the elias/saile reversal.', mono: MONOS.nodeE },
      ]},
    ];

    /* ---------- render ---------- */
    function panelInner(c, tag) {
      let nav, big;
      if (c.icon) {
        nav = `<a class="brand" href="#"><span class="logo">${c.icon}</span>${wordmark.plain()}</a>`;
        big = `<div class="big"><span class="logo">${c.icon}</span></div>`;
      } else if (c.mono) {
        nav = `<a class="brand" href="#"><span class="logo">${c.mono}</span>${wordmark.plain()}</a>`;
        big = `<div class="big"><span class="logo">${c.mono}</span></div>`;
      } else {
        nav = `<a class="brand" href="#">${wordmark[c.word]()}</a>`;
        big = `<div class="big"><span class="name" style="font-size:2rem">${wordmark[c.word]()}</span></div>`;
      }
      return `<div class="panel__tag">${tag}</div><div class="navbar">${nav}</div>${big}`;
    }

    const root = document.getElementById('root');
    let html = '';
    for (const g of CANDS) {
      html += `<div class="group__title">${g.group}</div>`;
      for (const c of g.items) {
        html += `<div class="cand">
          <div class="cand__head"><div class="cand__name">${c.name.replace('easter egg','<b>easter egg</b>')}</div><div class="cand__desc">${c.desc}</div></div>
          <div class="cand__panels">
            <div class="panel">${panelInner(c, 'light')}</div>
            <div class="panel" data-theme="dark" style="background:var(--cream)">${panelInner(c, 'dark')}</div>
          </div>
        </div>`;
      }
    }
    root.innerHTML = html;
  </script>
</body>
</html>
